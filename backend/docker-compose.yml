services:

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5l6LoHoDiI
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: travel-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: PASSWORD_RABBIT
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: travel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=lbB07FlWk4MDeGYx
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:lbB07FlWk4MDeGYx http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ==================== HashiCorp Vault ====================
  vault:
    image: hashicorp/vault:1.17
    container_name: travel-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Initialise les secrets Vault au demarrage
  vault-init:
    image: hashicorp/vault:1.17
    container_name: travel-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./infra/vault/init-secrets.sh:/init-secrets.sh
    entrypoint: ["/bin/sh", "/init-secrets.sh"]
    restart: "no"

  # ==================== Neo4j ====================
  neo4j:
    image: neo4j:5-community
    container_name: travel-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== MailDev ====================
  maildev:
    image: maildev/maildev:2.1.0
    container_name: travel-maildev
    ports:
      - "1025:1025"
      - "1080:1080"

  # ================================================================
  #  MICROSERVICES (profile "app")
  #  docker compose --profile app up -d --build
  # ================================================================

  # ==================== API Gateway ====================
  api-gateway:
    profiles: ["app"]
    build:
      context: ./api-gateway
      dockerfile: ../Dockerfile
    container_name: travel-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8080
    depends_on:
      vault-init:
        condition: service_completed_successfully

  # ==================== Auth Service ====================
  auth-service:
    profiles: ["app"]
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile
    container_name: travel-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

  # ==================== Travel Service ====================
  travel-service:
    profiles: ["app"]
    build:
      context: ./travel-service
      dockerfile: ../Dockerfile
    container_name: travel-travel-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

  # ==================== Payment Service ====================
  payment-service:
    profiles: ["app"]
    build:
      context: ./payment-service
      dockerfile: ../Dockerfile
    container_name: travel-payment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

  # ==================== Notification Service ====================
  notification-service:
    profiles: ["app"]
    build:
      context: ./notification-service
      dockerfile: ../Dockerfile
    container_name: travel-notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8084
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      maildev:
        condition: service_started

  # ==================== Search Service ====================
  search-service:
    profiles: ["app"]
    build:
      context: ./search-service
      dockerfile: ../Dockerfile
    container_name: travel-search-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8085
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

  # ==================== Rec Service ====================
  rec-service:
    profiles: ["app"]
    build:
      context: ./rec-service
      dockerfile: ../Dockerfile
    container_name: travel-rec-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VAULT_TOKEN: root
      SERVER_PORT: 8086
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  rabbitmq_data:
  elasticsearch_data:
  neo4j_data:
