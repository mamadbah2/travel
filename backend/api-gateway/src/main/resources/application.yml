server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:vault://
  cloud:
    vault:
      uri: http://localhost:8200
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: true
        backend: kv
        default-context: api-gateway
      # Routes are configured in GatewayRoutesConfig.java
      # CORS is handled by SecurityConfig.corsConfigurationSource()


# JWT secret (shared HMAC key, overridden by Vault)
jwt:
  secret: ${VAULT_JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    root: INFO
    sn.travel.api_gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
