    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm">
      @for (msg of notificationService.messages(); track msg.id) {
        <div
          class="px-4 py-3 rounded-lg border shadow-lg text-sm font-medium animate-slide-in"
          [class]="getStyle(msg.type)"
        >
          <div class="flex items-center justify-between gap-3">
            <span>{{ msg.message }}</span>
            <button
              (click)="notificationService.dismiss(msg.id)"
              class="text-current opacity-50 hover:opacity-100 cursor-pointer"
            >
              ✕
            </button>
          </div>
        </div>
      }
    </div>
