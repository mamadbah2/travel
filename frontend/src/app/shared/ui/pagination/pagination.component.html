    <nav class="flex items-center justify-center gap-2 py-6">
      <button
        (click)="pageChange.emit(currentPage() - 1)"
        [disabled]="isFirst()"
        class="px-3 py-2 rounded-lg text-sm font-medium transition-colors"
        [class]="isFirst() ? 'text-[#dbd3d8] cursor-not-allowed' : 'text-[#223843] hover:bg-[#223843]/10 cursor-pointer'"
      >
        Previous
      </button>

      @for (p of visiblePages(); track p) {
        <button
          (click)="pageChange.emit(p)"
          class="w-10 h-10 rounded-lg text-sm font-medium transition-colors cursor-pointer"
          [class]="p === currentPage()
            ? 'bg-[#223843] text-white'
            : 'text-[#223843] hover:bg-[#223843]/10'"
        >
          {{ p + 1 }}
        </button>
      }

      <button
        (click)="pageChange.emit(currentPage() + 1)"
        [disabled]="isLast()"
        class="px-3 py-2 rounded-lg text-sm font-medium transition-colors"
        [class]="isLast() ? 'text-[#dbd3d8] cursor-not-allowed' : 'text-[#223843] hover:bg-[#223843]/10 cursor-pointer'"
      >
        Next
      </button>
    </nav>
