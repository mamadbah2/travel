    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-[#223843] mb-1">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full px-4 py-3 rounded-lg border border-[#dbd3d8] bg-white text-[#223843] placeholder-[#dbd3d8] focus:outline-none focus:ring-2 focus:ring-[#d77a61]/50 focus:border-[#d77a61] transition-colors"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-[#223843] mb-1">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="8"
          class="w-full px-4 py-3 rounded-lg border border-[#dbd3d8] bg-white text-[#223843] placeholder-[#dbd3d8] focus:outline-none focus:ring-2 focus:ring-[#d77a61]/50 focus:border-[#d77a61] transition-colors"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 rounded-lg bg-[#223843] text-white font-medium hover:bg-[#223843]/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
      >
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
