    <div class="space-y-3">
      <h3 class="text-lg font-semibold text-[#223843]">Destinations</h3>
      @for (dest of destinations(); track dest.id) {
        <div class="flex items-start gap-3 p-3 rounded-lg bg-[#eff1f3]">
          <span class="text-[#d77a61] mt-0.5">📍</span>
          <div>
            <p class="font-medium text-[#223843]">{{ dest.name }}</p>
            <p class="text-sm text-[#223843]/60">{{ dest.country }}{{ dest.city ? ', ' + dest.city : '' }}</p>
            @if (dest.description) {
              <p class="text-sm text-[#223843]/50 mt-1">{{ dest.description }}</p>
            }
          </div>
        </div>
      } @empty {
        <p class="text-sm text-[#223843]/50">No destinations listed.</p>
      }
    </div>
