    <div class="bg-white rounded-xl border border-[#dbd3d8]/30 p-5 space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h3 class="font-semibold text-[#223843] text-lg truncate">{{ travel().title }}</h3>
          <p class="text-sm text-[#223843]/50 mt-1">{{ dates() }}</p>
        </div>
        <app-status-badge [status]="travel().status" />
      </div>

      <div class="flex items-center gap-4 text-sm text-[#223843]/60">
        <span>{{ travel().price | number:'1.0-0' }} €</span>
        <span>{{ travel().currentBookings }}/{{ travel().maxCapacity }} booked</span>
        <span>{{ travel().availableSpots }} spots left</span>
      </div>

      <div class="flex items-center gap-2 pt-2 border-t border-[#dbd3d8]/30">
        <a [routerLink]="['/manager', travel().id, 'edit']"
           class="px-3 py-1.5 text-sm font-medium text-[#223843] hover:bg-[#223843]/5 rounded-lg transition-colors">
          Edit
        </a>
        <a [routerLink]="['/manager', travel().id, 'manage']"
           class="px-3 py-1.5 text-sm font-medium text-[#223843] hover:bg-[#223843]/5 rounded-lg transition-colors">
          Manage
        </a>
        @if (travel().status === 'DRAFT') {
          <button (click)="publish.emit()" class="px-3 py-1.5 text-sm font-medium text-emerald-700 hover:bg-emerald-50 rounded-lg transition-colors cursor-pointer">
            Publish
          </button>
        }
        @if (travel().status === 'PUBLISHED') {
          <button (click)="cancelTravel.emit()" class="px-3 py-1.5 text-sm font-medium text-amber-700 hover:bg-amber-50 rounded-lg transition-colors cursor-pointer">
            Cancel
          </button>
        }
        <button (click)="deleteTravel.emit()" class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors ml-auto cursor-pointer">
          Delete
        </button>
      </div>
    </div>
