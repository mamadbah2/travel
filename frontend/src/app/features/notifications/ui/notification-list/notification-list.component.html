    <div class="space-y-3">
      <h4 class="font-semibold text-[#223843]">Notifications</h4>
      @for (notif of notifications(); track notif.id) {
        <div class="bg-white rounded-xl border border-[#dbd3d8]/30 p-4">
          <div class="flex items-center justify-between mb-2">
            <app-status-badge [status]="notif.type" />
            <span class="text-xs text-[#223843]/40">{{ notif.createdAt | date:'short' }}</span>
          </div>
          <p class="font-medium text-sm text-[#223843]">{{ notif.subject }}</p>
          <p class="text-sm text-[#223843]/60 mt-1 line-clamp-2">{{ notif.body }}</p>
        </div>
      } @empty {
        <p class="text-sm text-[#223843]/50">No notifications yet.</p>
      }
    </div>
